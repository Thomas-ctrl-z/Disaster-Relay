}).addTo(map);

var markerLayer = L.layerGroup().addTo(map);

// Coordinate fetching system from relay
function getCoords(parish, community) {
  const key = (community + ', ' + parish).toLowerCase().trim();
  if (coordsMap[key]) return coordsMap[key];
  const communityLower = community.toLowerCase().trim();
  for (const [k, v] of Object.entries(coordsMap)) {
    if (k.startsWith(communityLower + ',') || k === communityLower) return v;
  }
  const parishLower = parish.toLowerCase().trim();
  if (coordsMap[parishLower]) {
    const offset = () => (Math.random() - 0.5) * 0.03;
    return [coordsMap[parishLower][0] + offset(), coordsMap[parishLower][1] + offset()];
  }
  return [18.1096, -77.2975];
}

function addCountMarkerWithIcon(coords, count, priority, community) {
  const colors = { high: 'red', medium: 'orange', low: 'blue' };
  const iconUrls = {
    high: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    medium: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png',
    low: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png'
  };

  const countIcon = L.divIcon({
    html: `<div style="background:${colors[priority]}; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-weight:bold; border:2px solid white;" class="pulse-animation">${count}</div>`,
    className: '',
    iconSize: [30, 30],
    iconAnchor: [15, 15],
    popupAnchor: [0, -15],
  });

  const stdIcon = new L.Icon({
    iconUrl: iconUrls[priority],
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41],
  });

  L.marker(coords, { icon: countIcon }).addTo(markerLayer);
  L.marker(coords, { icon: stdIcon })
    .addTo(markerLayer)
    .bindPopup(`<b>${community}</b><br>${priority.charAt(0).toUpperCase() + priority.slice(1)} Priority ${count > 1 ? '(x' + count + ')' : ''}`);
}

// UI Functions
function createParishCard(parishName, communities) {
    const card = document.createElement('div');
    card.className = 'parish-card';
    const h3 = document.createElement('h3');
    h3.textContent = parishName;
    card.appendChild(h3);
    communities.sort((a,b)=>a.community.localeCompare(b.community));
    communities.forEach(comm=>{
        const details = document.createElement('details');
        details.className = 'community';
        const summary = document.createElement('summary');
        summary.textContent = comm.count>1 ? `${comm.community} x${comm.count}` : comm.community;
        details.appendChild(summary);
        const info = document.createElement('div');
        info.className = 'community-info';
        const needsP = document.createElement('p');
        needsP.className = 'needs';
        const needIcons = [];
        comm.needs.forEach(need=>{
            const n = need.toLowerCase();
            if(n.includes('food')) needIcons.push('🍞 Food');
            if(n.includes('water')) needIcons.push('💧 Water');
            if(n.includes('shelter')) needIcons.push('🏠 Shelter');
            if(n.includes('medical')) needIcons.push('🏥 Medical');
        });
        needsP.innerHTML = needIcons.join(' | ') || 'No specific needs';
        info.appendChild(needsP);
        const injuryP = document.createElement('p');
        const hasMedical = comm.needs.some(n=>n.toLowerCase().includes('medical'));
        injuryP.className = hasMedical ? 'injured' : 'none';
        injuryP.innerHTML = hasMedical ? '⚠ Injuries Reported' : '✔ No Injuries';
        info.appendChild(injuryP);
        details.appendChild(info);
        card.appendChild(details);
    });
    return card;
}

// Data Processing
const CSV_URL = 'https://docs.google.com/spreadsheets/d/13WUAN1zNK3fH_wX32QLb44EnQNiA5Z0_jwTtYA_2XHA/export?format=csv&gid=0';

async function loadDashboardData() {
    try {
        const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
        const csvText = await res.text();
        const lines = csvText.split(/\r?\n/);
        const headers = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/, ''));
        const communities = {};
        const seenIds = new Set();

        for(let i = 1; i < lines.length; i++) {
            if(!lines[i].trim()) continue;
            const vals = lines[i].split(',').map(v => v.trim());
            const row = {};
            headers.forEach((h, idx) => { row[h] = vals[idx] || ''; });
            
            const callId = row['CallID'] || row['callid'] || row['Call ID'] || '';
            if (!callId || seenIds.has(callId)) continue;
            seenIds.add(callId);

            const parish = row.Parish?.trim();
            const community = row.Community?.trim();
            if(!parish || !community) continue;

            const rawP = (row.Severity || row.Priority || "").toLowerCase().trim();
            let priority = 'low';
            if (rawP.includes('urgent') || rawP.includes('critical') || rawP.includes('high')) priority = 'high';
            else if (rawP.includes('moderate') || rawP.includes('medium') || rawP.includes('med')) priority = 'medium';

            const rawNeeds = row.Needs?.trim() || '';
            let needs = rawNeeds ? rawNeeds.replace(/[\[\]"]/g, '').split(',').map(n => n.trim()).filter(n => n.length > 0) : [];

            const key = `${parish}|${community}`;
            if(!communities[key]) {
                communities[key] = { parish, community, priority, needs, count: 1 };
            } else {
                const rank = {high:3, medium:2, low:1};
                if(rank[priority] > rank[communities[key].priority]) communities[key].priority = priority;
                needs.forEach(n => { if(!communities[key].needs.includes(n)) communities[key].needs.push(n); });
                communities[key].count++;
            }
        }

        markerLayer.clearLayers();
        const grouped = { high: {}, medium: {}, low: {} };

        Object.values(communities).forEach(c => {
            if (!grouped[c.priority][c.parish]) grouped[c.priority][c.parish] = [];
            grouped[c.priority][c.parish].push(c);
            
            // Add marker using the smart coord system
            const coords = getCoords(c.parish, c.community);
            addCountMarkerWithIcon(coords, c.count, c.priority, c.community);
        });

        ['high', 'medium', 'low'].forEach(prio => {
            const grid = document.querySelector(`.priority.${prio} .parish-grid`);
            if (grid) {
                grid.innerHTML = '';
                Object.keys(grouped[prio]).sort().forEach(parish => {
                    grid.appendChild(createParishCard(parish, grouped[prio][parish]));
                });
            }
        });

        document.getElementById('time-display').innerText = new Date().toLocaleTimeString();
    } catch (err) {
        console.error('Fetch error:', err);
    }
}

loadDashboardData();
setInterval(loadDashboardData, 10000);
</script>
</body>
</html>
