name: Fetch CSV Data

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes (minimum recommended)
  workflow_dispatch:  # Allow manual trigger

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch CSV from Google Sheets
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/13WUAN1zNK3fH_wX32QLb44EnQNiA5Z0_jwTtYA_2XHA/export?format=csv&gid=0" -o disaster-data.csv

      - name: Convert CSV to JSON
        run: |
          node -e "
          const fs = require('fs');
          const csv = fs.readFileSync('disaster-data.csv', 'utf8');
          const lines = csv.split('\n');
          const headers = lines[0].split(',').map(h => h.trim());
          const data = [];
          
          for(let i = 1; i < lines.length; i++) {
            if(!lines[i].trim()) continue;
            const values = lines[i].split(',').map(v => v.trim());
            const row = {};
            headers.forEach((h, idx) => row[h] = values[idx] || '');
            data.push(row);
          }
          
          fs.writeFileSync('disaster-data.json', JSON.stringify(data, null, 2));
          "

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add disaster-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update disaster data from CSV"
          git push